name: Build Release Zip

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Source/NoCavesContinued.csproj

      - name: Build
        run: dotnet build Source/NoCavesContinued.csproj -c Release --no-restore

      - name: Package mod
        id: package
        shell: bash
        run: |
          set -euo pipefail

          package_root="$RUNNER_TEMP/package"
          mod_root="$package_root/NoCavesContinued"
          zip_path="$GITHUB_WORKSPACE/NoCavesContinued-${GITHUB_RUN_NUMBER}.zip"

          rm -rf "$package_root" "$zip_path"
          mkdir -p "$mod_root"

          cp -R About "$mod_root/"
          cp -R 1.6 "$mod_root/"
          cp LoadFolders.xml "$mod_root/"
          cp README.md "$mod_root/"

          (
            cd "$package_root"
            zip -r "$zip_path" NoCavesContinued
          )

          {
            echo "zip_path=$zip_path"
            echo "zip_name=$(basename "$zip_path")"
          } >> "$GITHUB_OUTPUT"

      - name: Validate package
        shell: bash
        run: |
          set -euo pipefail

          zip_path="${{ steps.package.outputs.zip_path }}"
          extract_root="$RUNNER_TEMP/package-validation"

          rm -rf "$extract_root"
          mkdir -p "$extract_root"
          unzip -q "$zip_path" -d "$extract_root"

          required_paths=(
            "NoCavesContinued/About/About.xml"
            "NoCavesContinued/LoadFolders.xml"
            "NoCavesContinued/1.6/Assemblies/NoCavesContinued.dll"
            "NoCavesContinued/README.md"
          )

          for path in "${required_paths[@]}"; do
            if [[ ! -e "$extract_root/$path" ]]; then
              echo "Release zip is missing required file: $path" >&2
              exit 1
            fi
          done

          forbidden_paths=(
            "NoCavesContinued/.git"
            "NoCavesContinued/.github"
            "NoCavesContinued/Source"
            "NoCavesContinued/AGENTS.md"
          )

          for path in "${forbidden_paths[@]}"; do
            if [[ -e "$extract_root/$path" ]]; then
              echo "Release zip includes non-distribution path: $path" >&2
              exit 1
            fi
          done

      - name: Upload package artifact
        uses: actions/upload-artifact@v5
        with:
          name: NoCavesContinued
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="build-${GITHUB_RUN_NUMBER}"
          title="No Caves - Continued build ${GITHUB_RUN_NUMBER}"
          notes="Automated release from main branch commit ${GITHUB_SHA}."

          gh release create "$tag" "${{ steps.package.outputs.zip_path }}" \
            --target "$GITHUB_SHA" \
            --title "$title" \
            --notes "$notes" \
            --latest
